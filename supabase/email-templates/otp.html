<!--
  Supabase Auth email template — "Magic Link" template (used for signInWithOtp).
  Paste this into: Supabase Dashboard → Authentication → Email Templates → Magic Link.
  Uses {{ .Token }} for the 6-digit code. Inline styles only — email clients
  strip <style> blocks and most CSS features, so this stays table-based and
  inline for compatibility with Gmail/Outlook/Apple Mail.
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0b0d12;padding:32px 16px;">
  <tr>
    <td align="center">
      <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background:#12161e;border-radius:16px;overflow:hidden;font-family:Arial,Helvetica,sans-serif;">
        <tr>
          <td style="padding:32px 32px 0;text-align:center;">
            <img src="https://www.celesushi.cl/assets/logo.png" alt="CeleSushi Delivery" width="140" style="display:inline-block;height:auto;max-width:140px;" />
          </td>
        </tr>
        <tr>
          <td style="padding:28px 32px 8px;text-align:center;">
            <p style="margin:0;font-size:18px;font-weight:700;color:#f2f5f8;">Tu código de acceso</p>
            <p style="margin:8px 0 0;font-size:14px;color:#9aa7b4;line-height:1.5;">
              Ingresa este código para entrar a tu cuenta CeleSushi.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:20px 32px;text-align:center;">
            <div style="display:inline-block;background:#0b0d12;border:1px solid rgba(41,171,226,0.4);border-radius:12px;padding:18px 28px;">
              <span style="font-family:'Courier New',monospace;font-size:34px;font-weight:700;letter-spacing:0.28em;color:#7fd4fa;">{{ .Token }}</span>
            </div>
          </td>
        </tr>
        <tr>
          <td style="padding:8px 32px 32px;text-align:center;">
            <p style="margin:0;font-size:12.5px;color:#66727e;line-height:1.5;">
              El código expira en 1 hora. Si no pediste este código, ignora este correo.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:16px 32px;border-top:1px solid rgba(255,255,255,0.08);text-align:center;">
            <p style="margin:0;font-size:11.5px;color:#66727e;">
              © 2026 CeleSushi Delivery · Santiago de Chile
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
